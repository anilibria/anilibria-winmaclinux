<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="light dark">
	<title>Каталог релизов</title>
	<style>
	</style>
	<link rel="stylesheet" href="main.css">
	<link rel="stylesheet" href="mainmenu.css">
	<link rel="stylesheet" href="pagestructure.css">
</head>
<body>
	<div id="app">
		<page-header
			v-model:main-menu-visible="mainMenuVisible"
			title="Каталог релизов">
		</page-header>

		<div class="page-content-with-panel">
			<div class="left-panel">
				
			</div>
			<div class="right-content">
				<div class="page-subheader page-line-pair">
					<div>Множественный выбор</div>
					<div></div>
					<div class="flex-row flex-base-center" style="margin-right: 4px;">
						<simple-select
							v-model:item="sectionSelected"
							:options="sections"
							style="width: 180px;">
						</simple-select>
					</div>
				</div>
			</div>
		</div>

		<page-drawer
			v-model:main-menu-visible="mainMenuVisible">
		</page-drawer>
	</div>

	<script type="module">
		import { createApp, ref } from './vue.global.js'
		import { getRelasesPage } from './unfoldapi.js'
		import Drawer from './components/Drawer.js'
		import PageHeader from './components/PageHeader.js'
		import SimpleSelect from './components/SimpleSelect.js'

		const app = createApp({
			components: {
				'page-drawer': Drawer,
				'page-header': PageHeader,
				'simple-select': SimpleSelect,
			},
			setup() {
				const mainMenuVisible = ref(false);
				const sectionSelected = ref(1);

				const sections = [
					{
						title: "Все релизы",
						id: 1
					},
					{
						title: "Избранное",
						id: 2
					},
					{
						title: "Расписание",
						id: 3
					},
					{
						title: "Уведомления",
						id: 4
					},
				];

				return {
					mainMenuVisible,
					sectionSelected,
					sections
				}
			}
		});

		app.mount('#app')
	</script>
</body>
</html>
